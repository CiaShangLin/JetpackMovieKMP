schema: spec-driven

flow:
  worktree_base: ../JetpackMovieKMP-worktrees

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  ## 慣例
  - 註解與文件一律使用繁體中文(zh-tw)
  - Commit 前需通過 ktlintCheck
  - 測試採 AAA 模式（Arrange/Act/Assert），最低 80% 單元測試覆蓋率
  - API 金鑰放 key.properties（不進版控），透過 core/network 的 ApiKeyInterceptor 附加到請求；語言偏好透過 LanguageInterceptor 影響 API 呼叫

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  proposal:
    - "Impact 段落必須列出受影響的 module（例如 feature/home、core/domain）"
    - "若涉及新增依賴，需註明會動到 buildSrc 的哪些檔案（DependenciesVersions/Dependencies/DependenciesProvider）"
  specs:
    - "Requirement 與 Scenario 需以繁體中文(zh-tw) 撰寫"
  design:
    - "Decisions 段落需說明是否遵循既有 MVVM / MVI / Repository / Use Case 模式，若偏離需說明原因"
    - "若變更涉及資料庫 schema，需在 Risks / Trade-offs 註明 Room migration 策略"
  tasks:
    - "每個 task group 對應一個 module（例如 core/domain、feature/home、core/network）"
    - "涉及 UI 的 task 需包含對應的單元測試任務，維持最低 80% 覆蓋率"
    - "新增或修改 API 呼叫的 task 需包含 core/network 攔截器或 model 的更新項目"
